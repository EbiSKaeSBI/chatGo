<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGo Messenger</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        .app {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            gap: 12px;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.95;
        }

        .primary {
            background: #2563eb;
            color: white;
        }

        .secondary {
            background: #111827;
            color: white;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #555;
        }

        #chat {
            margin-top: 20px;
            height: 420px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #fafafa;
            padding: 14px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: white;
            border: 1px solid #e5e7eb;
        }

        .message.system {
            background: #f3f4f6;
            color: #4b5563;
            font-style: italic;
        }

        .message-header {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 15px;
            word-break: break-word;
        }

        .hint {
            margin-top: 12px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <h1>ChatGo Messenger</h1>

        <div class="grid grid-2">
            <div>
                <label for="username">Ваш ник</label>
                <input type="text" id="username" placeholder="например, alice">
            </div>
            <div>
                <label for="password">Ваш пароль</label>
                <input type="password" id="password" placeholder="123456">
            </div>

            <div>
                <label for="to">Кому</label>
                <input type="text" id="to" placeholder="например, bob">
            </div>
        </div>

        <div style="margin-top: 12px;">
            <label for="message">Сообщение</label>
            <input type="text" id="message" placeholder="Введите сообщение">
        </div>

        <div class="actions">
            <button type="button" class="primary" id="connectWs">Подключиться</button>
            <button type="button" class="secondary" id="sendMessage">Отправить</button>
        </div>

        <div class="status" id="status">Статус: не подключен</div>
        <div class="hint">Формат лички: укажи ник получателя и текст сообщения.</div>

        <div id="chat"></div>
    </div>
</div>

<script>
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const toInput = document.getElementById("to");
    const messageInput = document.getElementById("message");
    const connectButton = document.getElementById("connectWs");
    const sendButton = document.getElementById("sendMessage");
    const chat = document.getElementById("chat");
    const statusText = document.getElementById("status");

    let ws = null;

    function setStatus(text) {
        statusText.textContent = "Статус: " + text;
    }

    function appendMessage(message) {
        const item = document.createElement("div");
        item.className = "message";

        if (message.type === "system") {
            item.classList.add("system");
            item.textContent = message.text;
        } else {
            const header = document.createElement("div");
            header.className = "message-header";
            header.textContent = `${message.from} → ${message.to}`;

            const text = document.createElement("div");
            text.className = "message-text";
            text.textContent = message.text;

            item.appendChild(header);
            item.appendChild(text);
        }

        chat.appendChild(item);
        chat.scrollTop = chat.scrollHeight;
    }

    connectButton.addEventListener("click", () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username) {
            alert("Введите ник");
            return;
        }
        if (!password) {
            alert("Введите пароль")
            return;
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
            alert("Соединение уже открыто");
            return;
        }

        ws = new WebSocket(`ws://localhost:8080/ws?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);

        ws.onopen = () => {
            setStatus("подключен");
            console.log("WebSocket connected");
        };

        ws.onmessage = (event) => {
            try {
                const message = JSON.parse(event.data);
                appendMessage(message);
            } catch (error) {
                console.error("Ошибка парсинга JSON:", error);
                console.log("Raw message:", event.data);
            }
        };

        ws.onerror = (event) => {
            setStatus("ошибка");
            console.error("WebSocket error:", event);
        };

        ws.onclose = () => {
            setStatus("отключен");
            console.log("WebSocket closed");
        };
    });

    sendButton.addEventListener("click", () => {
        const to = toInput.value.trim();
        const text = messageInput.value.trim();

        if (!ws) {
            alert("Сначала подключись к серверу");
            return;
        }

        if (ws.readyState !== WebSocket.OPEN) {
            alert("Соединение не открыто");
            return;
        }

        if (!to) {
            alert("Укажи получателя");
            return;
        }

        if (!text) {
            alert("Введите сообщение");
            return;
        }

        const payload = {
            to: to,
            text: text
        };

        ws.send(JSON.stringify(payload));
        messageInput.value = "";
        messageInput.focus();
    });

    messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            sendButton.click();
        }
    });
</script>
</body>
</html>
