<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>chatGo</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<h1>ChatGo</h1>
<div id="chat"></div>
<form method="get">
    <label for="username">Введите ник</label>
    <input type="text" name="username" id="username">
    <label for="message">Введите сообщение</label>
    <input type="text" name="message" id="message">
    <div class="btn_section">
        <button type="button" id="connectWs">Подключение к серверу</button>
        <button type="button" id="sendMessage">Отправить сообщение</button>
    </div>

</form>
<script>
    const inputValueUsername = document.getElementById("username")
    const inputValueMessage = document.getElementById("message")
    const connectWs = document.getElementById("connectWs")
    const sendMessage = document.getElementById("sendMessage")
    const chat = document.getElementById("chat")

    let ws = null

    function appendMessage(message) {
        const item = document.createElement("div")

        if (message.type === "system") {
            item.textContent = message.text
            item.style.color = "gray"
        } else {
            item.textContent = `${message.username}: ${message.text}`
        }

        chat.appendChild(item)
        chat.scrollTop = chat.scrollHeight
    }

    connectWs.addEventListener("click", () => {
        const username = inputValueUsername.value.trim()

        if (!username) {
            console.log("Введите ник")
            return
        }

        ws = new WebSocket(`ws://localhost:8080/ws?username=${encodeURIComponent(username)}`)

        ws.onopen = (event) => {
            console.log("Соединение:", event.type)
        }

        ws.onmessage = (event) => {
            const message = JSON.parse(event.data)
            appendMessage(message)
        }

        ws.onerror = (event) => {
            console.error("error:", event)
        }

        ws.onclose = (event) => {
            console.log("Соединение:", event.type)
        }
    })

    sendMessage.addEventListener("click", () => {
        const text = inputValueMessage.value.trim()

        if (!ws) {
            console.log("Сначала подключись к серверу")
            return
        }

        if (ws.readyState !== WebSocket.OPEN) {
            console.log("Соединение не открыто")
            return
        }

        if (!text) {
            console.log("Введите сообщение")
            return
        }

        ws.send(text)
        inputValueMessage.value = ""
    })
</script>

</body>
</html>
