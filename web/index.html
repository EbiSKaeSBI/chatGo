<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>chatGo</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<h1>ChatGo</h1>
<div>
    <h4 id="message_username"></h4>
    <p id="text_message"></p>
</div>
<form method="get">
    <label for="username">Введите ник</label>
    <input type="text" name="username" id="username">
    <label for="message">Введите сообщение</label>
    <input type="text" name="message" id="message">
    <div class="btn_section">
        <button type="button" id="connectWs">Подключение к серверу</button>
        <button type="button" id="sendMessage">Отправить сообщение</button>
    </div>

</form>
<script>
    const inputValueUsername = document.getElementById("username")
    const inputValueMessage = document.getElementById("message")
    const connectWs = document.getElementById("connectWs")
    const sendMessage = document.getElementById("sendMessage")
    let ws

    try {
        connectWs.addEventListener("click", () => {
            ws = new WebSocket(`ws://localhost:8080/ws?username=${inputValueUsername.value}`)
            ws.onopen = (e) => console.log("Соединение : ", e.type)
            ws.onerror = (e) => console.error("error: ", e)
            ws.onclose = (e) => console.log("Соединение : ", e.type)
            console.log("new websocket connection: ", inputValueUsername.value)
        })
        sendMessage.addEventListener("click", () => {
            if (ws.readyState === ws.OPEN) {
                ws.send(inputValueMessage.value)
            }
        })

    } catch (e) {
        console.error("error: ", e)
    }

</script>
</body>
</html>
